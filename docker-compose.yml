services:
  # 1. Laravel Backend (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aito-note-backend
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
    volumes:
      - ./backend/database:/var/www/database
      - ./backend/storage:/var/www/storage
    networks:
      - notes-network

  # 2. Nginx Web Server for Backend API
  backend-nginx:
    image: nginx:alpine
    container_name: aito-note-backend-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - notes-network

  # 3. Frontend Web Server (React SPA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: aito-note-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend-nginx
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge
